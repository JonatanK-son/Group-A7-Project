# Spark Worker — Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-worker
  labels:
    app: spark-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spark-worker
  template:
    metadata:
      labels:
        app: spark-worker
    spec:
      containers:
        - name: spark-worker
          image: bitnami/spark:3.4
          imagePullPolicy: IfNotPresent
          env:
            - name: SPARK_MODE
              value: worker
            - name: SPARK_MASTER_URL
              value: spark://spark-master:7077
            - name: SPARK_WORKER_MEMORY
              value: 2G
            - name: SPARK_WORKER_CORES
              value: "1"
          resources:
            requests:
              memory: "2Gi"
              cpu:    "1000m"
            limits:
              memory: "4Gi"
              cpu:    "2000m"
          volumeMounts:
            - name: data-volume
              mountPath: /opt/bitnami/spark/data
            - name: output-volume
              mountPath: /opt/bitnami/spark/output
      volumes:
        - name: data-volume
          hostPath:
            path: /data
            type: Directory
        - name: output-volume
          hostPath:
            path: /output
            type: DirectoryOrCreate
