# Dask Workers — Deployment (scale replicas for more parallelism)
# Workers only need the ./output mount — raw CSVs are ingested locally
# before the pipeline runs and workers read validated Parquet from /app/output.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dask-worker
  labels:
    app: dask-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dask-worker
  template:
    metadata:
      labels:
        app: dask-worker
    spec:
      containers:
        - name: dask-worker
          image: ecom-pipeline:dev-v6
          imagePullPolicy: Never
          command:
            - dask
            - worker
            - tcp://dask-scheduler:8786
            - --nthreads
            - "4"
            - --memory-limit
            - "4GB"
          env:
            - name: PYTHONPATH
              value: /app
          resources:
            requests:
              memory: "2Gi"
              cpu:    "1000m"
            limits:
              memory: "4Gi"
              cpu:    "2000m"
          volumeMounts:
            - name: output-volume
              mountPath: /app/output
      volumes:
        - name: output-volume
          hostPath:
            path: /output
            type: DirectoryOrCreate
